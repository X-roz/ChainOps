network: Sepolia
native-asset: ETH
safe-block-buffer: 12
max-blocks-per-tick: 100
evm-block-listen: true
usdc-listen: true

# Contract addresses whose transfers are handled by dedicated log processors.
# Transactions to these addresses are skipped at the tx level to avoid duplicate events.
known-token-contracts:
  USDC: "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238" # Sepolia

publisher:
  nats-url: "nats://localhost:4222"
  subject: "chainops.block.activity"

database:
  host: # redacted
  port: # redacted
  user: # redacted
  password: # redacted
  dbname: # redacted
  sslmode: # redacted
  timezone: # redacted

rpc-urls:
  - https://0xrpc.io/sep
  - https://ethereum-sepolia-rpc.publicnode.com
  - https://eth-sepolia-testnet.api.pocket.network
